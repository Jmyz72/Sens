name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            target: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Ad-hoc sign the macOS bundle ("-") so resources are sealed. This turns
          # the misleading "app is damaged" Gatekeeper error into the normal
          # "unidentified developer" prompt that right-click → Open can bypass.
          # (Not a Developer ID — the build is still un-notarized.)
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Sens ${{ github.ref_name }}"
          releaseBody: |
            See CHANGELOG.md for details.

            **macOS** — this build is **not notarized** by Apple, so the first launch is blocked. Either:
            - Right-click (or Control-click) Sens.app → **Open** → **Open**, or
            - if you still see *"Sens is damaged and can't be opened"*, clear the download quarantine flag in Terminal:
              ```
              xattr -dr com.apple.quarantine /Applications/Sens.app
              ```
              then open it normally.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
